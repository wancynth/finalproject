<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>A Palace in Winter</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="title-container">
      <h1>A Palace<br>in Winter</h1>
        <p>
          You have found an abandoned
          palace in the middle of a snowy land. There
          are a few objects strewn on the ground.
          Find out what happened to this place.
        </p>
    </div>
    
    <section class="home-items-wrapper">
      <section class="home-items">
        <div class="items" id="key"></div>
        <p class="gray">
          A mysterious key, coated in rust.
        </p>
      </section>
      
      <section class="home-items">
        <div class="items" id="dagger"></div>
        <p class="gray">
          A dagger covered in bloodstains.
        </p>
      </section>
    </section>
    
    <section id="modal">
      <div id="close"></div>
        <h2>Art Project</h2>
        <p>
          This is an art project I made
        </p>
    </section>
    
    <script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
