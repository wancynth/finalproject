<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>A Palace in Winter</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <style>
      body {
        background-color: rgb(208, 223, 232)
      }
      
      img {
        height: 35vw;
        width: 35vw;
      }
    </style>
    
    <div class="title-container">
      <h1>A Palace<br>in Winter</h1>
        <p>
          You have found an abandoned
          palace in the middle of a snowy land. There
          are a few objects strewn on the ground.
          Find out what happened to this place.
        </p>
    </div>
    
    <section class="home-items-wrapper">
      <section class="home-items">
        <div class="items" id="key">
          <img src="css/images/key.png" alt="description of image">
        </div>
        <p class="gray">
          A mysterious key, coated in rust.
        </p>
      </section>
      
      <section class="home-items">
        <div class="items" id="dagger">
          <img src="css/images/dagger.png" alt="description of image">
        </div>
        <p class="gray">
          A dagger covered in bloodstains.
        </p>
      </section>
    </section>
    
    <section id="modal">
      <img id="close" src="css/images/back.png" alt="description of image">
      <div class="items-text">
        <h2>Art Project</h2>
        <p>
          This is an art project I made
        </p> 
      </div>
      <div class="items-img">
        <img src="css/images/key.png" alt="key" style="height: 30vw;
        width: 30vw;
        max-height: 300px;
        max-width: 300px;">
      </div>
<!--       <div class="items-text"></div> -->
      <a class="button" href="castle.html">
        <p style="color: black">Enter</p>
      </a>
    </section>
    
    <script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
