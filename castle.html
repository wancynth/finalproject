<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <style>
      body {
        overflow: scroll;
        margin: 6vw;
        min-width: 1100px;
      }
      
      a {
        pointer-events: auto;
        display: block;
      }
      
      img {
        position: absolute;
      }
      
    </style>
    <a class="back" href="index.html">
      <img src="css/images/back.png" alt="description of image" style="max-width: 60px;
  max-height: 30px;
    width: 8vw;
    height: 5vw;
    "
    href="index.html">
    </a>
    
    <nav class="castle">
      <a class="room-doors lower" href="room.html#bottom-left">
        <img src="css/images/door.png"
             alt="description of image"
             style="max-width: 160px;
              max-height: 212.8px;"
             >
      </a>
      <a class="room-doors" href="room.html#top-left">
        <img src="css/images/door.png" alt="description of image"
             style="max-width: 150px;
                max-height: 199.5px;">
      </a>
      <a class="room-doors higher" href="room.html#throne">
        <img src="css/images/throneroom.png" alt="description of image"
             style="  max-width: 120px;
              max-height: 159.6px;"
             >
      </a>
      <a class="room-doors" href="room.html#top-right">
        <img src="css/images/door2.png" alt="description of image"
             style="max-width: 150px;
                max-height: 199.5px;
                 transform: translateX(-30px)"
             >
      </a>
      <a class="room-doors lower" style="max-width: 160px;
              max-height: 212.8px;"
         href="room.html#bottom-right">
        <img src="css/images/door2.png" alt="description of image"
             style="max-width: 160px;
              max-height: 212.8px;
               transform: translateX(-30px)"
             >
      </a>
    </nav>
    
    <div style="position: relative; height: 40vw; max-height: 300px; text-align: center;">
          <p style="position: absolute; left: 47%;
              bottom: 0;
              ">Enter a room.</p>
    </div>

    
    
    <script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
